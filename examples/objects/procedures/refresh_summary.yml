# -----------------------------------------------------------
#  YAML lineage override (example)
# -----------------------------------------------------------
# frost auto-detects lineage from SQL procedure bodies.
# Use a YAML sidecar ONLY to override auto-detection when needed
# (e.g., dynamic SQL, EXECUTE IMMEDIATE, or non-SQL language bodies).
#
# When a YAML declares sources/targets, those values REPLACE the
# auto-detected ones.  Fields not declared here keep the
# auto-detected values.

sources:
  - PUBLIC.ORDERS
  - PUBLIC.CUSTOMERS
  - PUBLIC.EXCHANGE_RATES    # accessed via dynamic SQL — can't be auto-detected

targets:
  - PUBLIC.CUSTOMER_SUMMARY

description: >
  Aggregates order data per customer into the customer summary table.
  Includes exchange-rate lookup via EXECUTE IMMEDIATE.
